spring.application.name=HMS-Gateway

server.port=9000


#HMS- UserMs
spring.cloud.gateway.server.webflux.routes[0].id=HMS-User
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=TokenFilter

spring.cloud.gateway.server.webflux.default-filters[0] = DedupeResponseHeader=Access-Control-Allow-Origin, RETAIN_UNIQUE
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*

#HMS- ProfileMs
spring.cloud.gateway.server.webflux.routes[1].id=HMS-Profile
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8090
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/profile/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=TokenFilter

#HMS- AppointmentMs
spring.cloud.gateway.server.webflux.routes[2].id=HMS-Appointment
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8070
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/appointment/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=TokenFilter